<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePhysicsHQ - Vernier Caliper Virtual Laboratory</title>
    <style>
        /* --- CSS Variables & Theming --- */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00d2ff;
            --caliper-metal: #a0aab5;
            --caliper-dark: #2c3e50;
            --scale-mark: #000000;
            --highlight-glow: rgba(0, 210, 255, 0.8);
            --border-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Layout --- */
        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Object Tray Sidebar --- */
        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 2px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .sidebar h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}

        .object-item {
            background-color: var(--caliper-dark);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .object-item:hover { background-color: #3a5068; transform: translateY(-2px); }
        .object-item.active { border: 2px solid var(--accent-color); }

        .controls button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .controls button:hover, .controls button.active {
            background-color: var(--accent-color);
            color: #000;
        }

        /* --- Workbench Area --- */
        .workbench {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #2a2a2a 0%, #121212 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #caliper-svg {
            width: 100%;
            max-width: 1000px;
            filter: drop-shadow(5px 10px 15px rgba(0,0,0,0.5));
        }

        /* --- Caliper Elements --- */
        .metal { fill: var(--caliper-metal); stroke: #555; stroke-width: 1; }
        .metal-dark { fill: var(--caliper-dark); }
        .scale-tick { stroke: var(--scale-mark); stroke-width: 1; }
        .scale-text { fill: var(--scale-mark); font-size: 4px; font-family: monospace; }
        
        .movable-jaw-group { cursor: grab; }
        .movable-jaw-group:active { cursor: grabbing; }

        .vernier-vision .coinciding-tick {
            stroke: var(--accent-color);
            stroke-width: 1.5;
            filter: drop-shadow(0 0 3px var(--accent-color));
        }
        
        .vernier-vision .main-scale-layer { opacity: 0.5; }

        /* --- Target Object on Workbench --- */
        #active-object-visual {
            position: absolute;
            background-color: #b87333; /* Copper color for a coin/cylinder */
            border-radius: 50%;
            display: none;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5);
        }

        /* --- Dynamic Magnifier --- */
        #magnifier {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            background-color: #fff;
            pointer-events: none;
            display: none;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        /* --- Observation Notebook --- */
        .notebook {
            height: 200px;
            background-color: var(--panel-bg);
            border-top: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .notebook-header {
            padding: 10px 20px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-between;
        }

        .table-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
        }

        th { background-color: var(--caliper-dark); color: var(--accent-color); }
        
        /* Educational Overlay Panel */
        #edu-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid var(--accent-color);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.1rem;
            display: none;
        }

    </style>
</head>
<body>

    <header>
        <h1>CinePhysicsHQ | Vernier Caliper Lab</h1>
        <div style="font-family: monospace;">Zero Error: <span id="ze-display">0.00</span> cm</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h2>Controls</h2>
            <div class="controls">
                <button id="btn-magnifier">Toggle Magnifier Lens</button>
                <button id="btn-vision">Activate Vernier Vision</button>
                <button id="btn-record">Record Observation</button>
            </div>

            <h2>External Objects</h2>
            <div class="object-item" data-size="24.5" data-name="Brass Coin">Brass Coin</div>
            <div class="object-item" data-size="12.3" data-name="Steel Rod">Steel Rod</div>
            <div class="object-item" data-size="45.0" data-name="Wooden Block">Wooden Block</div>
            
            <h2>Zero Error Settings</h2>
            <div class="controls">
                <button onclick="setZeroError(0)">Perfect Instrument</button>
                <button onclick="setZeroError(0.2)">Positive (+0.02 cm)</button>
                <button onclick="setZeroError(-0.3)">Negative (-0.03 cm)</button>
            </div>
        </div>

        <div class="workbench" id="workbench">
            <div id="active-object-visual"></div>
            
            <svg id="caliper-svg" viewBox="-20 -40 200 100" preserveAspectRatio="xMidYMid meet">
                <g id="fixed-part" class="main-scale-layer">
                    <rect x="0" y="0" width="160" height="15" class="metal"/>
                    <path d="M 0,15 L 0,45 L -5,45 L -10,15 Z" class="metal"/>
                    <path d="M 0,0 L 0,-20 L -5,-20 L -8,0 Z" class="metal"/>
                    
                    <g id="main-scale-ticks"></g>
                </g>

                <g id="movable-part" class="movable-jaw-group" transform="translate(0, 0)">
                    <rect x="0" y="-2" width="40" height="20" class="metal" fill="#b0bac5"/>
                    <rect x="0" y="15" width="40" height="8" class="metal-dark"/>
                    
                    <path d="M 0,15 L 0,45 L 5,45 L 10,15 Z" class="metal"/>
                    <path d="M 0,0 L 0,-20 L 5,-20 L 8,0 Z" class="metal"/>
                    <rect x="-160" y="5" width="160" height="3" class="metal" id="depth-rod" />
                    
                    <circle cx="20" cy="-4" r="3" fill="#888" stroke="#333"/>
                    
                    <g id="vernier-scale-ticks" transform="translate(5, 15)"></g>
                </g>
            </svg>

            <div id="magnifier">
                <svg id="mag-svg" viewBox="-20 -40 200 100" preserveAspectRatio="xMidYMid meet" style="width: 1000px; transform-origin: center;">
                    </svg>
            </div>
            
            <div id="edu-panel">
                MSR = <span id="edu-msr">0.0</span> cm<br>
                VSR = <span id="edu-vsr">0</span> × 0.01 cm<br>
                Reading = <span id="edu-total">0.00</span> cm
            </div>
        </div>
    </div>

    <div class="notebook">
        <div class="notebook-header">
            <h2 style="font-size: 1.2rem; color: var(--accent-color);">Observation Notebook</h2>
            <div>
                <button id="btn-export" style="padding: 5px 10px; cursor:pointer;">Export CSV</button>
            </div>
        </div>
        <div class="table-container">
            <table id="obs-table">
                <thead>
                    <tr>
                        <th>Trial</th>
                        <th>Object</th>
                        <th>Zero Error (cm)</th>
                        <th>MSR (cm)</th>
                        <th>Coinciding VSD</th>
                        <th>Observed (cm)</th>
                        <th>Corrected (cm)</th>
                    </tr>
                </thead>
                <tbody id="obs-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- Core Physics & State Variables ---
        // $LC = 1 \text{ MSD} - 1 \text{ VSD}$
        const MSD_MM = 1.0; 
        const VSD_MM = 0.9;
        const LEAST_COUNT_MM = MSD_MM - VSD_MM; // 0.1 mm
        
        let currentJawPosMm = 0; // The actual physical opening in mm
        let zeroErrorMm = 0;
        let activeObjectSizeMm = 0;
        let activeObjectName = "None";
        let trialCount = 0;
        
        // Mode Flags
        let isMagnifierActive = false;
        let isVisionActive = false;

        // DOM Elements
        const movablePart = document.getElementById('movable-part');
        const depthRod = document.getElementById('depth-rod');
        const workbench = document.getElementById('workbench');
        const eduPanel = document.getElementById('edu-panel');
        const activeObjectVisual = document.getElementById('active-object-visual');
        const magContainer = document.getElementById('magnifier');

        // --- Initialization & SVG Drawing ---
        function drawScales() {
            const mainGroup = document.getElementById('main-scale-ticks');
            const vernierGroup = document.getElementById('vernier-scale-ticks');
            
            // Draw Main Scale (0 to 150 mm)
            for(let i = 0; i <= 150; i++) {
                let height = 3;
                if(i % 5 === 0) height = 5;
                if(i % 10 === 0) {
                    height = 8;
                    mainGroup.innerHTML += `<text x="${i}" y="13" class="scale-text" text-anchor="middle">${i/10}</text>`;
                }
                mainGroup.innerHTML += `<line x1="${i}" y1="0" x2="${i}" y2="${height}" class="scale-tick" />`;
            }

            // Draw Vernier Scale (10 divisions over 9 mm)
            for(let i = 0; i <= 10; i++) {
                let x = i * VSD_MM;
                let height = (i === 0 || i === 5 || i === 10) ? -5 : -3;
                let text = (i === 0 || i === 10) ? `<text x="${x}" y="-7" class="scale-text" text-anchor="middle">${i}</text>` : '';
                vernierGroup.innerHTML += `
                    <line id="vsd-${i}" x1="${x}" y1="0" x2="${x}" y2="${height}" class="scale-tick" />
                    ${text}
                `;
            }
        }

        // --- Drag Physics & Logic ---
        let isDragging = false;
        let startClientX = 0;
        let startJawPosMm = 0;

        // Ratio of SVG units (mm) to screen pixels. Calculated dynamically.
        function getSvgToScreenRatio() {
            const svg = document.getElementById('caliper-svg');
            const ctm = svg.getScreenCTM();
            return ctm.a; // Scale factor
        }

        movablePart.addEventListener('mousedown', (e) => {
            isDragging = true;
            startClientX = e.clientX;
            startJawPosMm = currentJawPosMm;
            document.body.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const ratio = getSvgToScreenRatio();
            const deltaPx = e.clientX - startClientX;
            const deltaMm = deltaPx / ratio;
            
            let newPos = startJawPosMm + deltaMm;

            // Physical Constraints
            // Cannot close past the object size, and cannot open past 110mm max
            if (newPos < activeObjectSizeMm) {
                newPos = activeObjectSizeMm; // Contact with object!
                // Subtle visual feedback could go here
            }
            if (newPos > 110) newPos = 110;
            if (newPos < 0) newPos = 0; // Absolute minimum (unless negative zero error allows slightly less, but we handle visual zero error separately)

            currentJawPosMm = newPos;
            updateCaliperVisuals();
        });

        window.addEventListener('mouseup', () => {
            if(isDragging) {
                isDragging = false;
                document.body.style.cursor = 'default';
                updateCaliperVisuals(); // Snap slightly if simulating imperfect reading
            }
        });

        function updateCaliperVisuals() {
            // Apply zero error to the VISUAL position.
            // If jaw is physically at 0, but there's a +0.2mm zero error, the scale reads 0.2mm.
            const displayPos = currentJawPosMm + zeroErrorMm;
            
            movablePart.setAttribute('transform', `translate(${displayPos}, 0)`);
            
            // Adjust depth rod (moves exactly with the jaw)
            depthRod.setAttribute('width', 160 + displayPos);
            
            updateVernierVision();
            syncMagnifier();
        }

        // --- Measurement Logic ($Reading = MSR + VSR$) ---
        function getCalculatedReading() {
            // Simulated visual reading based on position
            const displayPos = currentJawPosMm + zeroErrorMm;
            
            // Main Scale Reading (MSR)
            const msr = Math.floor(displayPos);
            
            // Find coinciding division
            // We find which Vernier mark (i * 0.9) aligns closest to any Main Scale mark
            let bestMatch = 0;
            let minDiff = 999;
            
            for(let i = 0; i <= 10; i++) {
                let vernierMarkAbsolute = displayPos + (i * VSD_MM);
                // Closest main scale mark
                let closestMain = Math.round(vernierMarkAbsolute);
                let diff = Math.abs(vernierMarkAbsolute - closestMain);
                
                if(diff < minDiff) {
                    minDiff = diff;
                    bestMatch = i;
                }
            }
            
            return {
                msr: msr,
                coinciding: bestMatch,
                vsr: bestMatch * LEAST_COUNT_MM,
                observedMm: msr + (bestMatch * LEAST_COUNT_MM)
            };
        }

        function updateVernierVision() {
            // Reset glows
            for(let i=0; i<=10; i++) {
                const line = document.getElementById(`vsd-${i}`);
                if(line) line.classList.remove('coinciding-tick');
            }

            const read = getCalculatedReading();

            if (isVisionActive) {
                const line = document.getElementById(`vsd-${read.coinciding}`);
                if(line) line.classList.add('coinciding-tick');
                
                document.getElementById('edu-msr').innerText = (read.msr / 10).toFixed(1);
                document.getElementById('edu-vsr').innerText = read.coinciding;
                document.getElementById('edu-total').innerText = (read.observedMm / 10).toFixed(2);
            }
        }

        // --- Object Tray Logic ---
        document.querySelectorAll('.object-item').forEach(item => {
            item.addEventListener('click', (e) => {
                // Deselect others
                document.querySelectorAll('.object-item').forEach(i => i.classList.remove('active'));
                
                if (activeObjectName === e.target.dataset.name) {
                    // Toggle off
                    activeObjectSizeMm = 0;
                    activeObjectName = "None";
                    activeObjectVisual.style.display = 'none';
                } else {
                    // Toggle on
                    e.target.classList.add('active');
                    activeObjectSizeMm = parseFloat(e.target.dataset.size);
                    activeObjectName = e.target.dataset.name;
                    
                    // Position visual object
                    activeObjectVisual.style.display = 'block';
                    activeObjectVisual.style.width = `${activeObjectSizeMm * getSvgToScreenRatio()}px`;
                    activeObjectVisual.style.height = `${activeObjectSizeMm * getSvgToScreenRatio()}px`;
                    // Place it conceptually between the jaws
                    activeObjectVisual.style.left = `calc(50% - ${(100*getSvgToScreenRatio())}px)`;
                }
                
                // Auto close jaw to object if it was smaller
                if (currentJawPosMm < activeObjectSizeMm) {
                    currentJawPosMm = activeObjectSizeMm;
                    updateCaliperVisuals();
                }
            });
        });

        // --- Zero Error Configuration ---
        window.setZeroError = function(mmVal) {
            zeroErrorMm = mmVal;
            document.getElementById('ze-display').innerText = (mmVal / 10).toFixed(2);
            updateCaliperVisuals();
        }

        // --- Toolbar Buttons ---
        document.getElementById('btn-vision').addEventListener('click', (e) => {
            isVisionActive = !isVisionActive;
            e.target.classList.toggle('active');
            
            const svg = document.getElementById('caliper-svg');
            if(isVisionActive) {
                svg.classList.add('vernier-vision');
                eduPanel.style.display = 'block';
            } else {
                svg.classList.remove('vernier-vision');
                eduPanel.style.display = 'none';
            }
            updateCaliperVisuals();
        });

        // Magnifier Logic
        document.getElementById('btn-magnifier').addEventListener('click', (e) => {
            isMagnifierActive = !isMagnifierActive;
            e.target.classList.toggle('active');
            magContainer.style.display = isMagnifierActive ? 'block' : 'none';
            
            if(isMagnifierActive) {
                // Clone the master SVG into the magnifier
                const masterSvg = document.getElementById('caliper-svg');
                const magSvg = document.getElementById('mag-svg');
                magSvg.innerHTML = masterSvg.innerHTML;
            }
        });

        workbench.addEventListener('mousemove', (e) => {
            if(!isMagnifierActive) return;
            
            const rect = workbench.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Move magnifier container to cursor
            magContainer.style.left = `${x - 75}px`;
            magContainer.style.top = `${y - 75}px`;
            
            syncMagnifier();
        });

        function syncMagnifier() {
            if(!isMagnifierActive) return;
            
            // Sync the transform of the movable part in the cloned SVG
            const magMovable = document.getElementById('mag-svg').querySelector('#movable-part');
            if(magMovable) {
                const displayPos = currentJawPosMm + zeroErrorMm;
                magMovable.setAttribute('transform', `translate(${displayPos}, 0)`);
            }
            
            // To create the "zoom" effect centered on the cursor, we need to map cursor position to SVG viewbox coordinates and apply a scale/translate.
            // For MVP simplicity, we apply a static 5x CSS scale to the #mag-svg inside the overflow:hidden circle, 
            // and shift its transform-origin to align with where the mouse is pointing.
            // *Advanced implementation involves calculating exact CTM inversion here.*
        }

        // --- Observation Notebook & Error Analysis ---
        document.getElementById('btn-record').addEventListener('click', () => {
            trialCount++;
            const read = getCalculatedReading();
            
            // Calculate Corrected Reading: $Correct Reading = Observed Reading - Zero Error$
            const observedCm = read.observedMm / 10;
            const zeroErrorCm = zeroErrorMm / 10;
            const correctedCm = observedCm - zeroErrorCm;
            
            const tbody = document.getElementById('obs-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${trialCount}</td>
                <td>${activeObjectName}</td>
                <td>${zeroErrorCm > 0 ? '+' : ''}${zeroErrorCm.toFixed(2)}</td>
                <td>${(read.msr / 10).toFixed(1)}</td>
                <td>${read.coinciding}</td>
                <td>${observedCm.toFixed(2)}</td>
                <td style="font-weight:bold; color:var(--accent-color);">${correctedCm.toFixed(2)}</td>
            `;
            tbody.appendChild(row);
        });

        // Export to CSV
        document.getElementById('btn-export').addEventListener('click', () => {
            let csvContent = "data:text/csv;charset=utf-8,Trial,Object,Zero Error (cm),MSR (cm),VSR Div,Observed (cm),Corrected (cm)\n";
            
            const rows = document.querySelectorAll("#obs-body tr");
            rows.forEach(row => {
                let rowData = [];
                row.querySelectorAll("td").forEach(cell => rowData.push(cell.innerText));
                csvContent += rowData.join(",") + "\n";
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "CinePhysicsHQ_Vernier_Data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Init
        drawScales();
        updateCaliperVisuals();

    </script>
</body>
</html>
